services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${RECALLANT_POSTGRES_CONTAINER_NAME:-recallant-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${RECALLANT_POSTGRES_HOST:-127.0.0.1}:${RECALLANT_POSTGRES_PORT:-15432}:5432"
    volumes:
      - ${RECALLANT_DATA_DIR:-/ai/recallant-data}/postgres:/var/lib/postgresql/data
      - ./packages/db/migrations:/migrations:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      interval: 5s
      timeout: 5s
      retries: 20
